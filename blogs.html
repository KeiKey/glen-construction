<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
.glen_blog-wrap{
  max-width:1100px;
  margin:auto;
  padding:20px
}
.glen_blog-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:30px
}
.glen_blog-item{
  display:flex;
  gap:16px;
  align-items:stretch;
  opacity:0;
  transform:translateY(20px);
  animation:glenFade .5s ease forwards
}
.glen_blog-item:hover .glen_blog-img{
  transform:scale(1.05)
}
.glen_blog-item:hover{
  transform:translateY(-4px)
}
.glen_blog-img{
  width:300px;
  height:300px;
  background:#eee;
  border-radius:10px;
  flex-shrink:0;
  transition:.3s;
  background-size:cover;
  background-position:center
}
.glen_blog-content{
  display:flex;
  flex-direction:column;
  flex:1
}
.glen_blog-content h3{
  margin-bottom:6px;
  font-size:18px
}
.glen_blog-content p{
  font-size:14px;
  opacity:.7;
  margin-bottom:10px
}
.glen_blog-date{
  font-size:12px;
  opacity:.6;
  margin-bottom:8px
}
.glen_blog-btn{
  margin-top:auto;
  padding:6px 12px;
  border:1px solid #ccc;
  border-radius:6px;
  font-size:13px;
  text-decoration:none;
  color:#000;
  display:inline-block;
  transition:.3s
}
.glen_blog-btn:hover{
  background:#000;
  color:#fff
}
.glen_blog-pagination{
  text-align:center;
  margin-top:30px
}
.glen_blog-pagination button{
  margin:0 4px;
  padding:6px 10px;
  border:1px solid #ccc;
  background:#fff;
  border-radius:6px;
  cursor:pointer;
  transition:.3s
}
.glen_blog-pagination button.active{
  background:#000;
  color:#fff
}
.glen_blog-pagination button:hover{
  background:#000;
  color:#fff
}
@keyframes glenFade{
  to{opacity:1;transform:translateY(0)}
}
@media(max-width:600px){
  .glen_blog-item{
    flex-direction:column
  }
  .glen_blog-img{
    width:100%;
    height:220px
  }
}
</style>
</head>

<body>

<div class="glen_blog-wrap">
  <div id="glen_blog-list" class="glen_blog-grid"></div>
  <div id="glen_blog-pagination" class="glen_blog-pagination"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded",function(){

let glen_postsData=[];
let glen_currentPage=1;
const glen_perPage=6;

fetch('/posts.json')
.then(res=>{
  if(!res.ok) throw new Error('Network error '+res.status);
  return res.text();
})
.then(text=>{
  try{
    const data=JSON.parse(text);
    if(!Array.isArray(data)) throw new Error('Invalid JSON');

    glen_postsData=data;

    if(glen_postsData.length===0){
      document.getElementById('glen_blog-list').innerHTML='No blogs found';
      return;
    }

    glen_renderBlogs();
    glen_renderPagination();

  }catch(e){
    document.getElementById('glen_blog-list').innerHTML='Invalid JSON format';
  }
})
.catch(()=>{
  document.getElementById('glen_blog-list').innerHTML='Failed to load blogs';
});

function glen_renderBlogs(){
  let start=(glen_currentPage-1)*glen_perPage;
  let end=start+glen_perPage;
  let posts=glen_postsData.slice(start,end);

  let output='';

  posts.forEach((p,i)=>{
    output+=`
    <div class="glen_blog-item" style="animation-delay:${i*0.1}s">
      <div class="glen_blog-img" style="background-image:url('${p.image || ''}')"></div>
      <div class="glen_blog-content">
        <h3>${p.title || 'No Title'}</h3>
        <p>${p.excerpt || ''}</p>
        <div class="glen_blog-date">${p.date || ''}</div>
        <a href="${p.url || '#'}" class="glen_blog-btn">Read More</a>
      </div>
    </div>`;
  });

  document.getElementById('glen_blog-list').innerHTML=output;
}

function glen_renderPagination(){
  let totalPages=Math.ceil(glen_postsData.length/glen_perPage);
  let btns='';

  for(let i=1;i<=totalPages;i++){
    btns+=`<button onclick="glen_goPage(${i})" class="${i===glen_currentPage?'active':''}">${i}</button>`;
  }

  document.getElementById('glen_blog-pagination').innerHTML=btns;
}

window.glen_goPage=function(page){
  glen_currentPage=page;
  glen_renderBlogs();
  glen_renderPagination();
  window.scrollTo({top:0,behavior:'smooth'});
}

});
</script>

</body>
</html>
